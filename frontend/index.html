<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GNN-Insight — Premium workspace to train, replay, compare, and govern Graph Neural Network experiments." />
    <meta name="theme-color" content="#dc2626" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#04060c" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0%25' stop-color='%23ef4444'/><stop offset='100%25' stop-color='%23ec4899'/></linearGradient></defs><rect x='3' y='3' width='26' height='26' rx='7' fill='url(%23g)'/><circle cx='11' cy='12' r='2.6' fill='white'/><circle cx='22' cy='12' r='2.6' fill='white'/><circle cx='16' cy='22' r='2.6' fill='white'/><path d='M11 12 L22 12 M11 12 L16 22 M22 12 L16 22' stroke='white' stroke-width='1.4' stroke-linecap='round' opacity='0.85'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>GNN Insight — Graph research, premium</title>
    <script>
      // Polyfill for libraries that expect 'global' or 'process' to exist (e.g. Plotly, xlsx)
      window.global = window;
      window.process = { env: { NODE_ENV: 'development' } };
    </script>
    <script>
      // Theme bootstrap — avoid FOUC on initial paint
      (function () {
        try {
          var stored = window.localStorage.getItem('gnn_theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          root.setAttribute('data-theme', theme);
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
